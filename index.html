<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa Llano San José</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="/node_modules/ol/ol.css" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="app-locked">

  <!-- HEADER -->
  <header id="header">
    <div id="logo">
      <!-- Crosshair / target symbol -->
      <svg class="logo-crosshair" width="34" height="34" viewBox="0 0 34 34" fill="none" aria-hidden="true">
        <!-- Outer ring -->
        <circle cx="17" cy="17" r="15" stroke="var(--accent)" stroke-width="1" class="ch-outer"/>
        <!-- Crosshair arms -->
        <line x1="17" y1="2"  x2="17" y2="8"  stroke="var(--accent)" stroke-width="1.5"/>
        <line x1="17" y1="26" x2="17" y2="32" stroke="var(--accent)" stroke-width="1.5"/>
        <line x1="2"  y1="17" x2="8"  y2="17" stroke="var(--accent)" stroke-width="1.5"/>
        <line x1="26" y1="17" x2="32" y2="17" stroke="var(--accent)" stroke-width="1.5"/>
        <!-- Tick marks -->
        <line x1="17" y1="10" x2="17" y2="12" stroke="var(--accent)" stroke-width="1" opacity="0.5"/>
        <line x1="17" y1="22" x2="17" y2="24" stroke="var(--accent)" stroke-width="1" opacity="0.5"/>
        <line x1="10" y1="17" x2="12" y2="17" stroke="var(--accent)" stroke-width="1" opacity="0.5"/>
        <line x1="22" y1="17" x2="24" y2="17" stroke="var(--accent)" stroke-width="1" opacity="0.5"/>
        <!-- Inner circle -->
        <circle cx="17" cy="17" r="4.5" stroke="var(--accent)" stroke-width="1" class="ch-inner" opacity="0.6"/>
        <!-- Center dot -->
        <circle cx="17" cy="17" r="1.8" fill="var(--accent)" class="ch-inner"/>
      </svg>

      <div class="logo-text-group">
        <span class="logo-system">Mapa <em>Llano San José</em></span>
        <span class="logo-desc">Cartografía Municipal · Elche</span>
      </div>
    </div>

    <div id="toolbar">
      <!-- Measure tool -->
      <button id="btn-measure" class="tool-btn" title="Medir distancias (M)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M3 9l3 3-3 3M21 9l-3 3 3 3"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="10" x2="8" y2="14" stroke-width="1.2"/>
          <line x1="12" y1="10" x2="12" y2="14" stroke-width="1.2"/>
          <line x1="16" y1="10" x2="16" y2="14" stroke-width="1.2"/>
        </svg>
        <span>Medir</span>
      </button>

      <div class="toolbar-sep"></div>

      <!-- Layers toggle -->
      <button id="btn-layers" class="tool-btn" title="Panel de capas (L)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="4" rx="1"/>
          <rect x="2" y="10" width="20" height="4" rx="1" opacity="0.6"/>
          <rect x="2" y="16" width="20" height="4" rx="1" opacity="0.35"/>
        </svg>
        <span>Capas</span>
      </button>

      <div class="toolbar-sep"></div>

      <!-- Área privada -->
      <button id="btn-admin" class="tool-btn tool-btn-icon" title="Área privada — Junta Directiva" aria-label="Área privada">
        <svg class="icon-lock-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <svg class="icon-lock-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
        </svg>
      </button>

      <div class="toolbar-sep"></div>

      <!-- Theme toggle -->
      <button id="btn-theme" class="tool-btn tool-btn-icon" title="Cambiar a modo claro / oscuro" aria-label="Cambiar tema">
        <!-- Sun icon — shown in dark mode (switch to light) -->
        <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2"  x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2"  y1="12" x2="5"  y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.22"  y1="4.22"  x2="6.34"  y2="6.34"/>
          <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
          <line x1="4.22"  y1="19.78" x2="6.34"  y2="17.66"/>
          <line x1="17.66" y1="6.34"  x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon icon — shown in light mode (switch to dark) -->
        <svg class="icon-moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

    <!-- SEARCH -->
    <div id="search-box">
      <div id="search-input-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="search-icon">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Buscar calle…" autocomplete="off" spellcheck="false" />
        <button id="search-clear" title="Limpiar">×</button>
      </div>
      <div id="search-number-wrap" class="hidden">
        <span id="search-street-label"></span>
        <input type="text" id="search-number" placeholder="Nº" autocomplete="off" maxlength="6" />
        <button id="search-go">Ir</button>
        <button id="search-reset" title="Nueva búsqueda">↩</button>
      </div>
      <ul id="search-results"></ul>
      <!-- Tarjeta de socio (visible solo si está identificado y hay coincidencia) -->
      <div id="member-card" class="hidden"></div>
    </div>
  </header>

  <!-- LOGIN MODAL -->
  <div id="login-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <span>ÁREA PRIVADA</span>
      </div>
      <form id="login-form" class="modal-body">
        <div class="modal-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" autocomplete="username" required />
        </div>
        <div class="modal-field">
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" autocomplete="current-password" required />
        </div>
        <div id="login-error" class="modal-error hidden"></div>
        <button type="submit" id="login-submit">Acceder</button>
      </form>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <aside id="admin-panel" class="panel-closed">
    <div class="panel-header">
      <span>Junta Directiva</span>
      <div class="admin-header-right">
        <span id="admin-user-email" class="admin-user-email"></span>
        <button id="admin-pwd-btn" class="admin-btn-sm" title="Cambiar contraseña">🔑</button>
        <button id="admin-logout" class="admin-btn-sm">Salir</button>
        <button id="expand-admin" class="panel-close-btn" title="Expandir panel">⤢</button>
        <button id="close-admin" class="panel-close-btn">×</button>
      </div>
    </div>
    <div id="admin-tabs" class="admin-tabs hidden">
      <button class="admin-tab active" data-tab="socios">Socios</button>
      <button class="admin-tab" data-tab="usuarios">Usuarios</button>
      <button class="admin-tab" data-tab="recibos">Recibos</button>
    </div>
    <div class="admin-toolbar">
      <div class="admin-search-wrap">
        <svg class="admin-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="admin-search-input" placeholder="Filtrar socios…" autocomplete="off" />
      </div>
      <button id="admin-add-btn" class="admin-btn-primary">+ Nuevo</button>
    </div>
    <div id="admin-csv-toolbar" class="admin-csv-toolbar hidden">
      <button id="admin-export-btn" class="admin-btn-sm" title="Exportar socios a CSV">↓ CSV</button>
      <button id="admin-import-btn" class="admin-btn-sm" title="Importar socios desde CSV">↑ CSV</button>
      <input type="file" id="admin-import-input" accept=".csv" class="hidden" />
    </div>
    <div id="admin-map-toolbar" class="admin-csv-toolbar hidden">
      <button id="admin-map-toggle-btn" class="admin-btn-sm" title="Mostrar/ocultar socios en el mapa">📍 Socios en mapa</button>
      <label class="admin-map-opt" title="Mostrar también los socios dados de baja">
        <input type="checkbox" id="admin-map-show-inactive" />
        <span>incluir bajas</span>
      </label>
    </div>
    <div class="admin-list-section">
      <div id="admin-list"></div>
    </div>
    <div id="admin-form-wrap" class="hidden"></div>
    <div id="admin-users-section" class="hidden"></div>
    <div id="admin-receipts-section" class="hidden">
      <div class="recibos-form">
        <div class="admin-field">
          <label>Socios</label>
          <div class="rec-radio-group">
            <label class="rec-radio-label">
              <input type="radio" name="rec-mode" value="todos" checked /> Todos
            </label>
            <label class="rec-radio-label">
              <input type="radio" name="rec-mode" value="uno" /> Uno específico
            </label>
            <label class="rec-radio-label">
              <input type="radio" name="rec-mode" value="blanco" /> En blanco
            </label>
          </div>
        </div>
        <div id="rec-socio-wrap" class="admin-field hidden">
          <label>Socio</label>
          <select id="rec-socio-select" class="rec-select"></select>
        </div>
        <div id="rec-blank-count-wrap" class="admin-field hidden">
          <label>Cantidad de recibos</label>
          <input id="rec-blank-count" type="number" value="1" min="1" max="50" />
        </div>
        <div class="rec-row">
          <div class="admin-field">
            <label>Año</label>
            <input id="rec-year" type="number" min="2020" max="2100" />
          </div>
          <div class="admin-field">
            <label>Mes</label>
            <select id="rec-month" class="rec-select">
              <option value="1">Enero</option>
              <option value="2">Febrero</option>
              <option value="3">Marzo</option>
              <option value="4">Abril</option>
              <option value="5">Mayo</option>
              <option value="6">Junio</option>
              <option value="7">Julio</option>
              <option value="8">Agosto</option>
              <option value="9">Septiembre</option>
              <option value="10">Octubre</option>
              <option value="11">Noviembre</option>
              <option value="12">Diciembre</option>
            </select>
          </div>
        </div>
        <div class="rec-row">
          <div class="admin-field">
            <label>Importe (€)</label>
            <input id="rec-importe" type="number" value="15" min="1" />
          </div>
          <div class="admin-field">
            <label>Nº inicial</label>
            <input id="rec-start-num" type="number" value="1" min="1" />
          </div>
        </div>
        <div class="admin-field">
          <label>Nombre del cobrador <span class="rec-hint">(aparece en la copia)</span></label>
          <input id="rec-cobrador" type="text" placeholder="Ej: ANTONIO" />
        </div>
        <div id="rec-error" class="admin-form-error hidden"></div>
        <button id="rec-generate-btn" class="admin-btn-primary rec-generate-btn">Generar PDF</button>
      </div>
    </div>
  </aside>

  <!-- LAYERS PANEL -->
  <aside id="layers-panel" class="panel-closed">
    <div class="panel-header">
      <span>Capas</span>
      <button id="close-layers">×</button>
    </div>
    <div id="layers-list"></div>
  </aside>

  <!-- MAP -->
  <div id="map"></div>

  <!-- FOOTER -->
  <footer id="footer">
    <span id="coords">— , —</span>
    <span id="scale-info"></span>
    <span id="measure-hint" class="hidden">Clic para añadir punto · Doble clic para terminar · Esc para cancelar</span>
  </footer>

  <!-- MAP POPUP — información extendida del socio al clicar en el mapa -->
  <div id="map-popup" role="dialog" aria-label="Información del socio">
    <button id="map-popup-close" class="mp-close" aria-label="Cerrar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div id="map-popup-body"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
